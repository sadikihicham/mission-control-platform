[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008 : `= Depends(...)` est le pattern idiomatique FastAPI, pas un bug.
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
# conftest doit définir des variables d'env AVANT les imports (E402/I001).
"apps/api/tests/conftest.py" = ["E402", "I001"]
# runner stdlib du CLI : assertions compactes avec ';'.
"apps/agent-cli/tests/test_client.py" = ["E702"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["apps/api/tests"]
