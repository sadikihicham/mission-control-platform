name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API · lint + tests d'intégration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mc
          POSTGRES_PASSWORD: mc
          POSTGRES_DB: mc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mc -d mc_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://mc:mc@localhost:5432/mc_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret
      MC_INGEST_TOKEN: test-ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r apps/api/requirements.txt
      - name: Ruff lint
        run: ruff check apps
      - name: Pytest (intégration sur DB éphémère)
        run: pytest -q

  web:
    name: Web · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
