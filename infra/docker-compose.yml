# Nom de projet Compose fixé explicitement : sans ça, Compose l'infère du dossier contenant le
# 1er fichier -f (`infra/` → projet "infra"), qui diffère du nom "agent-control" que fixe
# docker-compose.prod-fronted.yml — deux identités différentes selon la combinaison de fichiers
# utilisée feraient que `make logs`/`ps`/`psql`/`restart`/`down` (qui n'utilisent que ce fichier
# de base) cibleraient un projet vide sur le serveur, différent de la stack réellement démarrée
# par `infra/deploy-prod.sh`. Fixé ici une fois pour toutes, valable pour toute combinaison -f.
name: agent-control

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc
      POSTGRES_DB: mission_control
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Pas de port hôte (5432 souvent occupé) ; accès via `make psql`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d mission_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      # Sonde d'ÉCRITURE jugée sur la SORTIE, pas `ping` jugé sur le code de sortie. Mesuré sur
      # `redis-cli 7.4.9` : le client ne traduit JAMAIS une erreur applicative en code de sortie
      # (rc=0 sur `OOM command not allowed`, sur `NOAUTH`, sur `MISCONF`) et un `ping` réussit
      # pendant un OOM (l'OOM ne refuse que les ÉCRITURES). Un `["CMD","redis-cli","ping"]` ne peut
      # donc virer au rouge que si le serveur est injoignable en TCP — aveugle au refus d'écriture.
      # Ici c'est PRÉVENTIF (ce redis n'a ni `requirepass` ni `--maxmemory` aujourd'hui, donc aucune
      # des deux pannes n'est encore atteignable) : on rend la sonde honnête AVANT que l'ajout d'un
      # `--maxmemory` ne crée le mode de panne au moment précis où l'ancienne sonde serait aveugle.
      # Si un `requirepass` est ajouté un jour, passer le secret par `REDISCLI_AUTH` (jamais `-a`
      # dans ce shell : un mot de passe à espace/guillemet y casserait le quoting → sonde rouge à vie
      # → `depends_on` bloqué). La clé porte un TTL : évincable, jamais un poison pill.
      test: ["CMD-SHELL", "redis-cli set __healthcheck__ 1 EX 30 | grep -qx OK"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Nom de service `ag-api` (pas `api`) : sur le réseau externe partagé `caddy_net` (prod
  # co-hébergée, cf. infra/docker-compose.prod-fronted.yml), le nom de service EST l'entrée DNS
  # vue par le Caddy de l'hôte — pas un simple alias. `api` collisionnerait avec le service `api`
  # de SGI (même précédent que l'incident GuardianOps du 2026-07-11, résolu par `go-api`/`go-web`).
  ag-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: ["sh", "infra/api-entrypoint.sh"]
    working_dir: /app
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://mc:mc@postgres:5432/mission_control
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      MC_INGEST_TOKEN: ${MC_INGEST_TOKEN:-dev-ingest-token}
      MC_STATUS_DIR: /app/.mission-control/status
    volumes:
      # Repo monté → code + migrations + statuts mc live-éditables (mode dev).
      - ..:/app
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 8

  # Frontend conteneurisé — optionnel (build long). En dev, préférer `make web`.
  # Activation : `docker compose --profile full up --build`. Nom `ag-web` : même raison que `ag-api`.
  ag-web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8008
    environment:
      # Le serveur Next.js standalone lit HOSTNAME pour choisir l'interface d'écoute (server.js :
      # `process.env.HOSTNAME || '0.0.0.0'`). Docker fixe HOSTNAME=<id conteneur> par défaut, qui se
      # résout sur l'IP du 1er réseau attaché seulement — invisible depuis un 2e réseau (ex.
      # caddy_net en prod fronted). Écraser explicitement pour écouter sur toutes les interfaces.
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      ag-api:
        condition: service_healthy

volumes:
  pgdata:
